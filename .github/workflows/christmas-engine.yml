name: Christmas Flowers Engine

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: git-push-lock
  cancel-in-progress: false

jobs:
  holiday-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config --global user.name "ChristmasBot"
          git config --global user.email "bot@brightlane.dev"

      - name: Sync Latest Remote
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Generate seasonal.html
        shell: bash
        run: |
          TOPICS=("Perfect Christmas Table Centerpieces" "Sending Poinsettias for the Holidays" "Last Minute Christmas Eve Delivery" "Holiday Wreath Care Tips" "Luxury Winter Rose Arrangements" "Fresh Evergreen Bouquet Ideas")
          SELECTED_TOPIC="${TOPICS[$RANDOM % ${#TOPICS[@]}]}"
          echo "SELECTED_TOPIC=$SELECTED_TOPIC" >> $GITHUB_ENV
          SELECTED_TOPIC="$SELECTED_TOPIC" python3 generate_seasonal.py

      - name: Commit Changes
        shell: bash
        run: |
          git add seasonal.html
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git commit -m "Seasonal Update ${SELECTED_TOPIC}"

      - name: Safe Push Retry Loop
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            echo "Push attempt $i"
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed, retrying..."
              git rebase --abort || true
              sleep 5
              continue
            }
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push rejected. Retrying in 5s..."
            sleep 5
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Done
        run: echo "Christmas Flowers Engine done"
