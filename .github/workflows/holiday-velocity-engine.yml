name: Holiday Velocity Engine (Regional Matrix)

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: git-push-lock
  cancel-in-progress: false

jobs:
  update-christmas-matrix:
    runs-on: ubuntu-latest

    steps:
      - name: Sync Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config --global user.name "HolidayVelocityBot"
          git config --global user.email "bot@brightlane.dev"

      - name: Sync Latest Remote
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Generate regional.html
        shell: bash
        run: |
          HEADLINES=("Bespoke Christmas Floral Arrangements" "Artisanal Holiday Greens" "Festive Poinsettia Delivery" "Same-Day Holiday Bouquets" "Winter Wreath Delivery Guide")
          CITIES=("Chicago IL" "New York NY" "Los Angeles CA" "Toronto ON" "Dallas TX" "Miami FL" "Seattle WA" "Vancouver BC")
          SELECTED_H="${HEADLINES[$RANDOM % ${#HEADLINES[@]}]}"
          SELECTED_C="${CITIES[$RANDOM % ${#CITIES[@]}]}"
          echo "SELECTED_H=$SELECTED_H" >> $GITHUB_ENV
          echo "SELECTED_C=$SELECTED_C" >> $GITHUB_ENV
          SELECTED_H="$SELECTED_H" SELECTED_C="$SELECTED_C" python3 generate_regional.py

      - name: Commit Changes
        shell: bash
        run: |
          git add regional.html
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git commit -m "Regional Update ${SELECTED_H} ${SELECTED_C}"

      - name: Safe Push Retry Loop
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            echo "Push attempt $i"
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed, retrying..."
              git rebase --abort || true
              sleep 5
              continue
            }
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push rejected. Retrying in 5s..."
            sleep 5
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Done
        run: echo "Holiday Velocity Engine done"
