name: Holiday Velocity Super-Matrix

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-and-link:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Master Content & Link Injection
        run: |
          # 1. Variables
          CITY_LIST=("Chicago" "New York" "London" "Toronto" "Los Angeles" "Miami" "Dallas")
          CITY=${CITY_LIST[$RANDOM % ${#CITY_LIST[@]}]}
          
          # 2. THE CROSS-LINK FOOTER (The "1 Code" Secret)
          # This footer links back to your other project to boost overall domain authority
          CROSS_LINK_FOOTER="<footer style='margin-top:60px; padding:40px; border-top:4px solid #2e7d32; text-align:center; background:#fffcfd; font-family:serif;'>
            <div style='margin-bottom:20px;'>
              <a href='index.html'>Home</a> | <a href='blog.html'>Holiday Blog</a> | <a href='faq.html'>200+ FAQs</a> | <a href='sitemap.xml'>Sitemap</a>
            </div>
            <div style='background:#fdeff2; padding:15px; border-radius:10px; border:1px solid #d63384; display:inline-block;'>
              <strong>Looking for non-holiday flowers?</strong><br>
              Visit our partner: <a href='https://brightlane.github.io/SameDayFlowers/' style='color:#d63384; font-weight:bold;'>Same Day Flowers Express</a>
            </div>
            <p style='margin-top:20px;'>🎄 <strong>Now Serving $CITY:</strong> <a href='https://www.floristone.com/index.cfm?source_id=christmas&AffiliateID=2013017799'><strong>Shop Christmas Collection</strong></a></p>
          </footer>"

          # 3. Generate the Page
          cat > blog.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <title>Bespoke Christmas Arrangements in $CITY | 2026 Guide</title>
            <style>body{font-family:serif; line-height:1.8; max-width:850px; margin:auto; padding:30px; background:#fffafa;}</style>
          </head>
          <body>
            <h1>Christmas Floral Trends for $CITY Residents</h1>
            <p>Today we are looking at the unique holiday traditions in <strong>$CITY</strong> and how to get guaranteed delivery...</p>
            $CROSS_LINK_FOOTER
          </body>
          </html>
          EOF

      - name: Commit Changes
        run: |
          git config user.name "SuperMatrixBot"
          git config user.email "bot@brightlane.dev"
          git add blog.html
          git commit -m "Engine Sync: $CITY Cross-Link Update" || echo "No changes"
          git push
