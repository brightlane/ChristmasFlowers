name: Christmas Super Matrix Engine

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: git-push-lock   # shared lock across ALL three workflows
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure Git
        run: |
          git config --global user.name "SuperMatrixBot"
          git config --global user.email "bot@brightlane.dev"

      - name: Sync Latest Remote
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Generate blog.html
        shell: bash
        run: |
          CITIES=("Chicago, IL" "New York, NY" "Toronto, ON" "Los Angeles, CA" "Miami, FL" "Dallas, TX" "Vancouver, BC" "Boston, MA")
          TOPICS=("Luxury Poinsettia Delivery" "Bespoke Holiday Centerpieces" "Fresh Cedar Wreath Care" "Christmas Eve Floral Logistics")
          QUORA_Q=("What is the best flower for a Christmas gift?" "How do I keep my holiday bouquet fresh?" "Where can I order flowers on Dec 24th?" "Is a Poinsettia better than a Wreath?")

          CITY="${CITIES[$RANDOM % ${#CITIES[@]}]}"
          TOPIC="${TOPICS[$RANDOM % ${#TOPICS[@]}]}"
          QUESTION="${QUORA_Q[$RANDOM % ${#QUORA_Q[@]}]}"

          # Export for commit and webhook steps
          echo "CITY=$CITY"   >> $GITHUB_ENV
          echo "TOPIC=$TOPIC" >> $GITHUB_ENV

          FOOTER="<footer style='margin-top:50px; padding:40px; border-top:3px solid #2e7d32; text-align:center; background:#fffcfd;'>
            <nav style='margin-bottom:20px; font-family:serif;'>
              <a href='index.html'>Festive Home</a> |
              <a href='blog.html'>Holiday Blog</a> |
              <a href='seasonal.html'>Seasonal Tips</a> |
              <a href='regional.html'>Regional Guide</a> |
              <a href='faq.html'>200+ Gift FAQs</a> |
              <a href='sitemap.xml'>Sitemap</a>
            </nav>
            <p>🎄 <strong>Now Serving ${CITY}:</strong>
              <a href='https://www.floristone.com/index.cfm?source_id=christmas&AffiliateID=2013017799'>
                <strong>Shop the Christmas Collection</strong>
              </a>
            </p>
            <p style='font-size:0.8em; color:#666;'>Official Partner of FloristOne Network. Hand-delivered for the 2026 Season.</p>
          </footer>"

          cat > blog.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>${TOPIC} in ${CITY} | Christmas Flowers 2026</title>
            <meta name="description" content="Expert holiday guide on ${TOPIC} specifically for residents of ${CITY}.">
            <link rel="canonical" href="https://brightlane.github.io/ChristmasFlowers/blog.html" />
            <style>
              body{font-family:serif;line-height:1.8;max-width:900px;margin:auto;padding:40px;background:#fffafa;color:#1b5e20;}
              h1,h2{color:#c62828;}
              .quora-box{background:white;border:1px solid #c62828;padding:25px;border-radius:15px;margin:30px 0;}
            </style>
          </head>
          <body>
            <h1>${TOPIC}: ${CITY} Holiday Edition</h1>
            <article>
              <p>The 2026 holiday season in <strong>${CITY}</strong> requires a special touch. Today's guide explores <strong>${TOPIC}</strong> and why local delivery is the only way to ensure your greens arrive fresh.</p>

              <div class="quora-box">
                <h3 style="color:#c62828;">Quora Spotlight: Q&amp;A of the Day</h3>
                <p><strong>Question:</strong> ${QUESTION}</p>
                <p><strong>Answer:</strong> When looking for ${TOPIC} in ${CITY}, the key is the local florist network. FloristOne ensures your order is hand-arranged by an artist in your specific neighborhood.</p>
              </div>

              <h2>Why ${CITY} Chooses Local Holiday Delivery</h2>
              <p>Unlike boxed shipping services, local partners in ${CITY} understand the specific climate and delivery needs of the area. Fresh flowers, same-day availability, and neighbourhood-level care make all the difference during the holidays.</p>

              <h2>Top Picks for ${TOPIC}</h2>
              <p>From classic red poinsettias to lush cedar wreaths, the 2026 season offers more variety than ever. Local florists in ${CITY} stock arrangements suited to the season's trends, ensuring every gift feels curated rather than generic.</p>
            </article>
            $FOOTER
          </body>
          </html>
          EOF

      - name: Commit Changes
        shell: bash
        run: |
          git add blog.html

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "SuperMatrix Sync: ${TOPIC} in ${CITY}"

      - name: Safe Push Retry Loop
        shell: bash
        run: |
          for i in 1 2 3 4 5; do
            echo "Push attempt $i"
            git fetch origin main
            git rebase origin/main || {
              echo "Rebase failed, retrying..."
              git rebase --abort || true
              sleep 5
              continue
            }
            if git push origin main; then
              echo "Push successful"
              exit 0
            fi
            echo "Push rejected. Retrying in 5s..."
            sleep 5
          done
          echo "Push failed after 5 attempts"
          exit 1

      - name: Social Webhook
        shell: bash
        run: |
          curl -X POST "${{ secrets.SOCIAL_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"${TOPIC} in ${CITY}\",
              \"url\": \"https://brightlane.github.io/ChristmasFlowers/blog.html\",
              \"caption\": \"Looking for ${TOPIC} in ${CITY}? We have the 2026 guide ready! 🎄 #ChristmasFlowers #Gifts\"
            }" || echo "Social webhook skipped (secret not set)."
