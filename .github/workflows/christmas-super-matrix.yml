name: Christmas Super Matrix Engine

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate 10K Word Matrix
        run: |
          # 1. DATA ARRAYS (The SEO Fuel)
          CITIES=("Chicago, IL" "New York, NY" "Toronto, ON" "Los Angeles, CA" "Miami, FL" "Dallas, TX" "Vancouver, BC" "Boston, MA")
          TOPICS=("Luxury Poinsettia Delivery" "Bespoke Holiday Centerpieces" "Fresh Cedar Wreath Care" "Christmas Eve Floral Logistics")
          QUORA_Q=("What is the best flower for a Christmas gift?" "How do I keep my holiday bouquet fresh?" "Where can I order flowers on Dec 24th?" "Is a Poinsettia better than a Wreath?")
          
          # 2. SELECTION LOGIC
          CITY=${CITIES[$RANDOM % ${#CITIES[@]}]}
          TOPIC=${TOPICS[$RANDOM % ${#TOPICS[@]}]}
          QUESTION=${QUORA_Q[$RANDOM % ${#QUORA_Q[@]}]}
          
          # 3. CONSOLIDATED FOOTER (The Inter-Linker)
          FOOTER="<footer style='margin-top:50px; padding:40px; border-top:3px solid #2e7d32; text-align:center; background:#fffcfd;'>
            <nav style='margin-bottom:20px; font-family:serif;'>
              <a href='index.html'>Festive Home</a> | <a href='blog.html'>Holiday Blog</a> | <a href='faq.html'>200+ Gift FAQs</a> | <a href='sitemap.xml'>Sitemap</a>
            </nav>
            <p>🎄 <strong>Now Serving $CITY:</strong> <a href='https://www.floristone.com/index.cfm?source_id=christmas&AffiliateID=2013017799'><strong>Shop the Christmas Collection</strong></a></p>
            <p style='font-size:0.8em; color:#666;'>Official Partner of FloristOne Network. Hand-delivered for the 2026 Season.</p>
          </footer>"

          # 4. GENERATE BLOG.HTML (Deep Content + Regional + Quora)
          cat > blog.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <title>$TOPIC in $CITY | Christmas Flowers 2026</title>
            <meta name="description" content="Expert holiday guide on $TOPIC specifically for residents of $CITY.">
            <style>body{font-family:serif; line-height:1.8; max-width:900px; margin:auto; padding:40px; background:#fffafa; color:#1b5e20;}</style>
          </head>
          <body>
            <h1>$TOPIC: $CITY Holiday Edition</h1>
            <article>
              <p>The 2026 holiday season in <strong>$CITY</strong> requires a special touch. Today's guide explores <strong>$TOPIC</strong> and why local delivery is the only way to ensure your greens arrive fresh...</p>
              
              <div style="background:white; border:1px solid #c62828; padding:25px; border-radius:15px; margin:30px 0;">
                <h3 style="color:#c62828;">Quora Spotlight: Q&A of the Day</h3>
                <p><strong>Question:</strong> $QUESTION</p>
                <p><strong>Answer:</strong> When looking for $TOPIC in $CITY, the key is the local florist network. FloristOne ensures that your order is hand-arranged by an artist in your specific neighborhood.</p>
              </div>

              <h2>Why $CITY Chooses Local Holiday Delivery</h2>
              <p>Unlike boxed shipping services, our local partners in $CITY understand the specific climate and delivery needs of the area...</p>
            </article>
            $FOOTER
          </body>
          </html>
          EOF

      - name: Final Commit & Social Webhook
        run: |
          git config user.name "SuperMatrixBot"
          git config user.email "bot@brightlane.dev"
          git add blog.html
          git commit -m "SuperMatrix Sync: $TOPIC in $CITY" || echo "No changes"
          git push

          # Social Media Payload (Send to Zapier/n8n/Postiz)
          curl -X POST ${{ secrets.SOCIAL_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d "{
            \"title\": \"$TOPIC in $CITY\",
            \"url\": \"https://brightlane.github.io/ChristmasFlowers/blog.html\",
            \"caption\": \"Looking for $TOPIC in $CITY? We have the 2026 guide ready! 🎄 #ChristmasFlowers #$CITY #Gifts\"
          }" || echo "Social Webhook skipped."
